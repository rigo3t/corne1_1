# Key Debounce Configuration
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# BLE Transmit Power Configuration
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Windows Battery Reporting Fix
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# OLED Display Configuration
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Central Widgets (WPM & Luna Modifiers)
CONFIG_ZMK_WPM=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=y

# HID Indicators (Caps Lock Alert)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA_ONLY_CAPSLOCK=y

# Peripheral (Right Side) Animation
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_WPM=y

# Power Management Configuration
CONFIG_ZMK_IDLE_TIMEOUT=150000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Wake & External Power Configuration
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# ZMK Studio Configuration
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# BLE Connection Stability Improvements
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# USB Logging Configuration
CONFIG_ZMK_USB_LOGGING=n

# Clear BLE Bonds on Start
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
