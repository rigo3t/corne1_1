# --- Global Hardware Definitions ---
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_ZMK_IDLE_TIMEOUT=150000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# --- OLED Display & Performance ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# --- WPM Widget ---
CONFIG_NICE_OLED_WIDGET_WPM_GAUGE_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_WPM_GAUGE_CUSTOM_Y=70
CONFIG_NICE_OLED_WIDGET_WPM_NEEDLE_CENTER_CUSTOM_X=12
CONFIG_NICE_OLED_WIDGET_WPM_NEEDLE_CENTER_CUSTOM_Y=90
CONFIG_NICE_OLED_WIDGET_WPM_LABEL_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_WPM_LABEL_CUSTOM_Y=75

# Disable standard text/speedometer to clear screen for the graph
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=y

# Graph Configuration
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=y
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH_FIXED_RANGE=y
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH_FIXED_RANGE_MAX=100

# Explicitly disable animations on Central
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n

# --- Modifier / Luna Configuration ---
# Enables the Modifier widget layer
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
# Explicitly enables Luna for the modifier layer
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=y

# --- Studio Support ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
